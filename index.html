<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorting Visualizer</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for modern typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="glass-panel">
            <h1>Sorting Visualizer</h1>
            <div class="controls-container">
                <div class="control-group">
                    <label for="algorithm-select">Algorithm</label>
                    <select id="algorithm-select">
                        <option value="bubble">Bubble Sort</option>
                        <option value="selection">Selection Sort</option>
                        <option value="insertion">Insertion Sort</option>
                    </select>
                </div>
                
                <div class="control-group">
                    <label for="speed-slider">Speed</label>
                    <input type="range" id="speed-slider" min="10" max="1000" step="10" value="700">
                </div>

                <div class="control-group">
                    <label for="size-slider">Array Size</label>
                    <input type="range" id="size-slider" min="5" max="50" step="1" value="15">
                </div>

                <div class="control-group custom-input-group">
                    <label for="custom-array-input">Custom Array (CSV)</label>
                    <div class="input-row">
                        <input type="text" id="custom-array-input" placeholder="e.g. 5,20,15" title="Comma-separated numbers">
                        <button id="set-custom-array-btn" class="btn primary">Set</button>
                    </div>
                </div>

                <div class="button-group">
                    <button id="new-array-btn" class="btn primary">Random</button>
                    <button id="prev-step-btn" class="btn secondary" disabled>Prev Step</button>
                    <button id="play-pause-btn" class="btn play">Play</button>
                    <button id="next-step-btn" class="btn secondary">Next Step</button>
                    <button id="reset-btn" class="btn danger">Reset</button>
                </div>
            </div>
        </header>

        <main class="visualization-container" id="visualization-container">
            <!-- Bars will be inserted here dynamically -->
        </main>

        <div class="explanation-panel glass-panel" id="complexity-explanation">
            <!-- Explanation will be inserted here dynamically -->
        </div>

        <footer class="info-panel glass-panel">
            <div class="info-item">
                <span class="label">Step:</span>
                <span id="step-counter" class="value">0 / 0</span>
            </div>
            <div class="info-item">
                <span class="label">Time Complexity:</span>
                <span id="time-complexity" class="value">O(n²) [Worst] | O(n²) [Average] | O(n) [Best]</span>
            </div>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
